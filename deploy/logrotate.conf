# CTA ETA log rotation configuration
# Install: sudo cp deploy/logrotate.conf /etc/logrotate.d/cta-eta

# Note: Logs sent to systemd journal (via StandardOutput=journal in service files)
# are managed automatically by journald — logrotate is NOT needed for those.
# journald rotation is configured via /etc/systemd/journald.conf (SystemMaxUse, etc.)
# The entries below cover any file-based logs written directly by daemons.

# JSONL diagnostic event logs written by the daemon diagnostics subsystem
# (config: diagnostics.event_log_path in config.toml)
/opt/cta-eta/.daemon_state/*.jsonl {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    # Use copytruncate instead of create: the Python daemons hold open file
    # descriptors to these log files. Using 'create' would orphan the old
    # file descriptor — the daemon would keep writing to the renamed/deleted
    # file instead of the newly created one. copytruncate copies the file
    # then truncates it in place, so the daemon's open fd keeps working.
    copytruncate
}

# General daemon log files (if any file-based logging is enabled)
# (config: logging.log_path in config.toml, default: logs/cta_eta.log)
/opt/cta-eta/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    # Same reason as above: copytruncate avoids breaking open file handles
    copytruncate
}
