#cloud-config

package_update: true
package_upgrade: true
packages:
  - git
  - logrotate
  - curl

write_files:
  - path: /etc/profile.d/uv.sh
    permissions: "0644"
    content: |
      export PATH="/usr/local/bin:$PATH"

runcmd:
  - curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh
  - export PATH="/usr/local/bin:$PATH"
  - useradd --system --home-dir /opt/cta-eta --shell /bin/bash cta-eta || true
  - mkdir -p /home/cta-eta
  - git clone --depth 1 https://github.com/jdwh08/cta-eta /opt/cta-eta
  - chown -R cta-eta:cta-eta /opt/cta-eta
  - sudo -u cta-eta env PATH=/usr/local/bin:$PATH uv sync --no-dev --directory /opt/cta-eta
  - sudo -u cta-eta cp /opt/cta-eta/.env.template /opt/cta-eta/.env
  - chmod 600 /opt/cta-eta/.env
  - sudo -u cta-eta mkdir -p /opt/cta-eta/.daemon_state /opt/cta-eta/.cache /opt/cta-eta/logs /opt/cta-eta/data
  - cp /opt/cta-eta/deploy/cta-train-daemon.service /opt/cta-eta/deploy/cta-weather-daemon.service /opt/cta-eta/deploy/cta-alerts.service /opt/cta-eta/deploy/cta-alerts.timer /opt/cta-eta/deploy/cta-compaction.service /opt/cta-eta/deploy/cta-compaction.timer /etc/systemd/system/
  - cp /opt/cta-eta/deploy/logrotate.conf /etc/logrotate.d/cta-eta
  - systemctl daemon-reload
  - systemctl enable cta-train-daemon.service cta-weather-daemon.service cta-alerts.timer cta-compaction.timer
  - [sh, -c, "echo 'cloud-init completed' > /tmp/cloud-init.log"]

final_message: "Fill (sudo) /opt/cta-eta/.env then run: sudo systemctl start cta-train-daemon cta-weather-daemon cta-alerts.timer cta-compaction.timer"
